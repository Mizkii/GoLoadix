name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.1

      - name: Install NSIS
        run: choco install nsis --yes --no-progress
        shell: pwsh

      - name: Build
        run: |
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          wails build -nsis
        shell: pwsh

      - name: List build output
        run: Get-ChildItem build/bin/
        shell: pwsh

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          name: GoLoadix ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/bin/GoLoadix.exe
            build/bin/GoLoadix-amd64-installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
